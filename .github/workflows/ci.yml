name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check Bash syntax
        run: bash -n scripts/*.sh scripts/lib/*.sh tests/*.sh

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh scripts/lib/*.sh tests/*.sh

      - name: Run tests
        run: ./tests/run.sh
